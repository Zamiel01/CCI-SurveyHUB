<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ survey.title }} — {{ _('Password Required') }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .form-input {
            width: 100%;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            padding: 0.5rem 0.75rem;
            font-size: 0.875rem;
            color: #1e293b;
            outline: none;
            transition: border-color 0.15s ease-in-out;
        }
        .form-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center">

    <div class="max-w-md w-full mx-auto px-6">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-8">
            
            <div class="flex items-center gap-3 mb-6">
                <div class="w-10 h-10 bg-blue-600 rounded-md flex items-center justify-center text-white">
                    <i class="fas fa-lock text-sm"></i>
                </div>
                <div>
                    <span class="text-xs font-semibold text-slate-500 uppercase tracking-wider">CCI SurveyHUB</span>
                    <h1 class="text-lg font-bold text-slate-800">{{ survey.title }}</h1>
                </div>
            </div>

            <div class="mb-6">
                <p class="text-sm text-slate-600 mb-1">{{ _('This survey is password protected.') }}</p>
                <p class="text-xs text-slate-400">{{ _('Please enter the password provided by the survey administrator to continue.') }}</p>
            </div>

            {% if error %}
            <div class="mb-4 px-4 py-3 rounded-lg text-sm font-medium bg-red-50 text-red-700 border border-red-200">
                {{ error }}
            </div>
            {% endif %}

            <form action="{{ url_for('responses.survey_password', token=survey.public_token) }}" method="POST">
                <div class="mb-4">
                    <label class="block text-xs font-medium text-slate-600 mb-1">{{ _('Password') }}</label>
                    <input type="password" name="password" class="form-input" required autofocus placeholder="{{ _('Enter survey password') }}">
                </div>
                <button type="submit" class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium shadow-sm transition-colors">
                    <i class="fas fa-unlock"></i> {{ _('Access Survey') }}
                </button>
            </form>
        </div>

        <div class="mt-4 text-center text-xs text-slate-400">
            {{ _('Powered by CCI SurveyHUB — Chamber of Commerce and Industry') }}
        </div>
    </div>

</body>
</html>
